services:
  postgres:
    image: postgres:16-alpine
    container_name: chinahouse-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - chinahouse_pgdata:/var/lib/postgresql/data

volumes:
  chinahouse_pgdata:
